<style>
*{margin:0;padding:0;box-sizing:border-box}

    <div style="font-weight:700;font-size:13px;color:#065f46;margin-bottom:6px">E-Fatura PDF Yukle</div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:8px">

        <input id="expRcpVendor" list="expVendorList" placeholder="Satici adi" style="width:100%;border:1px solid #d1d5db;border-radius:5px;padding:5px 8px;font-size:12px;box-sizing:border-box">

        <label style="font-size:11px;color:#6b7280;font-weight:600">Tarih</label>

        <label style="font-size:11px;color:#6b7280;font-weight:600">Misafir</label>

        <label style="font-size:11px;color:#6b7280;font-weight:600">Kim Aldi</label>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
var DEF_KW={butler:["Ahmet","Mehmet","Elif","Bekir","Selin"]};
function getKW(cat){try{var s=localStorage.getItem("kw_"+cat);return s?JSON.parse(s):DEF_KW[cat]?DEF_KW[cat].slice():[]}catch(e){return DEF_KW[cat]?DEF_KW[cat].slice():[]}}

function toggleSettingsSection(header){var body=header.nextElementSibling;if(body.style.display==="none"){body.style.display="block";header.classList.add("open")}else{body.style.display="none";header.classList.remove("open")}}

// EXPENSE MODULE
// ============================================================
var EXP_CATEGORIES_DEFAULT=["Guest Amenity","Decoration","Minibar Preference","F&B","Office Supplies","Transportation","Other"];
var EXP_BUDGET_DEFAULT=50000;
var EXP_KASA_DEFAULT=27100;
let expenseList=[];
var expKasaLog=[];
var exp_currentMonth=new Date().getMonth()+1;
var exp_currentYear=new Date().getFullYear();
var _expParsedData=null;
var _expLastReceipt=null;

function getExpCategories(){try{var s=localStorage.getItem("exp_categories");return s?JSON.parse(s):EXP_CATEGORIES_DEFAULT.slice()}catch(e){return EXP_CATEGORIES_DEFAULT.slice()}}
function setExpCategories(arr){localStorage.setItem("exp_categories",JSON.stringify(arr))}
function getExpBudget(){try{var s=localStorage.getItem("exp_budget");return s?parseFloat(s):EXP_BUDGET_DEFAULT}catch(e){return EXP_BUDGET_DEFAULT}}
function setExpBudget(v){localStorage.setItem("exp_budget",JSON.stringify(v))}
function getExpKey(){return"exp_"+exp_currentYear+"_"+exp_currentMonth}
function getExpKasa(){try{var s=localStorage.getItem("exp_kasa_"+exp_currentYear+"_"+exp_currentMonth);return s?parseFloat(s):EXP_KASA_DEFAULT}catch(e){return EXP_KASA_DEFAULT}}
function setExpKasa(v){localStorage.setItem("exp_kasa_"+exp_currentYear+"_"+exp_currentMonth,JSON.stringify(v))}
function getExpLogKey(){return"exp_log_"+exp_currentYear+"_"+exp_currentMonth}
function expLoadLog(){try{var s=localStorage.getItem(getExpLogKey());expKasaLog=s?JSON.parse(s):[]}catch(e){expKasaLog=[]}}
function expSaveLog(){localStorage.setItem(getExpLogKey(),JSON.stringify(expKasaLog))}
function expAddLog(action,entry){
  expKasaLog.push({ts:Date.now(),action:action,vendor:entry.vendor||"",amount:entry.totalAmount||0,guest:entry.guest||"",butler:entry.butler||"",category:entry.category||"",payType:entry.payType||"expense",fileRef:entry.fileRef||""});
  expSaveLog();
}
function expPopulateButlers(){
  var butlers=getKW("butler");
  ["expRcpButler","expInvButler"].forEach(function(id){
    var sel=document.getElementById(id);
    if(!sel)return;
    sel.innerHTML='<option value="">-</option>';
    butlers.forEach(function(b){var o=document.createElement("option");o.value=b;o.textContent=b;sel.appendChild(o)});
  });
}

function expInit(){
  document.getElementById("exp_monthSel").value=exp_currentMonth;
  document.getElementById("exp_yearSel").value=exp_currentYear;
  expPopulateCategories();
  expPopulateButlers();
  expLoad();
  expLoadLog();

// ---- INVOICE PDF PARSER ----
function parseTurkishNumber(s){
  if(!s)return 0;
  s=s.replace(/\s/g,"").replace(/TL$/i,"").trim();
  // Turkish: 1.500,00 → 1500.00
  s=s.replace(/\./g,"").replace(",",".");
  return parseFloat(s)||0;
}

function expParseInvoicePdf(file){
  if(!file)return;
  var status=document.getElementById("expPdfStatus");
  status.textContent="PDF okunuyor...";
  var reader=new FileReader();
  reader.onload=function(ev){
    if(typeof pdfjsLib==="undefined"){status.innerHTML='<span style="color:#dc2626">PDF.js yuklenemedi</span>';return;}
    pdfjsLib.getDocument({data:new Uint8Array(ev.target.result)}).promise.then(function(pdf){
      var allText="";
      var pages=[];
      for(var i=1;i<=pdf.numPages;i++)pages.push(i);
      var chain=Promise.resolve();
      pages.forEach(function(p){
        chain=chain.then(function(){
          return pdf.getPage(p).then(function(page){
            return page.getTextContent().then(function(tc){
              tc.items.forEach(function(item){allText+=item.str+" "});
              allText+="\n";
            });
          });
        });
      });
      chain.then(function(){
        var parsed=parseInvoiceText(allText);
        if(!parsed.invoiceNo&&!parsed.totalAmount){
          status.innerHTML='<span style="color:#dc2626">Parse basarisiz — fatura bilgisi bulunamadi</span>';
          return;
        }
        _expParsedData=parsed;
        showParsedPreview(parsed);
        status.innerHTML='<span style="color:#059669">PDF basariyla parse edildi</span>';
      });
    }).catch(function(err){
      status.innerHTML='<span style="color:#dc2626">PDF okuma hatasi: '+err.message+'</span>';
    });
  };
  reader.readAsArrayBuffer(file);
}

function parseInvoiceText(text){
  var r={invoiceNo:"",date:"",vendor:"",netAmount:0,vatAmount:0,totalAmount:0,vatRate:0,invoiceType:"SATIS",vatBreakdown:[]};

  // Fatura No
  var m=text.match(/Fatura\s*No\s*:?\s*([A-Z0-9]+)/i);
  if(m)r.invoiceNo=m[1];

  // Fatura Tipi
  m=text.match(/Fatura\s*Tipi\s*:?\s*(SATIS|IADE)/i);
  if(m)r.invoiceType=m[1].toUpperCase();

  // Tarih — multiple formats
  m=text.match(/(?:Fatura\s*Tarihi|Tarih)\s*:?\s*(\d{1,2}[\s\-\.\/]+\d{1,2}[\s\-\.\/]+\d{2,4})/i);
  if(m){
    var ds=m[1].replace(/\s+/g,"").replace(/[\/\-]/g,".");
    var parts=ds.split(".");
    if(parts.length===3){
      var dd=parts[0],mm=parts[1],yy=parts[2];
      if(yy.length===2)yy="20"+yy;
      r.date=yy+"-"+(mm.length===1?"0"+mm:mm)+"-"+(dd.length===1?"0"+dd:dd);
    }
  }

  // Odenecek Tutar (total including VAT)
  m=text.match(/[OÖö]denecek\s*Tutar\s*:?\s*([\d\.\s,]+)\s*(?:TL)?/i);
  if(m)r.totalAmount=parseTurkishNumber(m[1]);

  // Net Tutar — try multiple patterns
  m=text.match(/Mal\s*Hizmet\s*Toplam\s*Tutar[ıi]?\s*:?\s*([\d\.\s,]+)\s*(?:TL)?/i);
  if(!m)m=text.match(/Vergi(?:ler)?\s*Hari[cç]\s*Tutar\s*:?\s*([\d\.\s,]+)\s*(?:TL)?/i);
  if(m)r.netAmount=parseTurkishNumber(m[1]);

  // KDV breakdown — multiple rates possible
  var re=/Hesaplanan\s*KDV[^%]*%(\d+)[^)]*\)?\s*:?\s*([\d\.\s,]+)\s*(?:TL)?/gi;
  var match;
  while((match=re.exec(text))!==null){
    var rate=parseInt(match[1]);
    var amt=parseTurkishNumber(match[2]);
    r.vatBreakdown.push({rate:rate,amount:amt});
    r.vatAmount+=amt;
    if(!r.vatRate||rate>r.vatRate)r.vatRate=rate;
  }

  // If no net found but total and vat found
  if(!r.netAmount&&r.totalAmount&&r.vatAmount){
    r.netAmount=r.totalAmount-r.vatAmount;
  }
  // If no total but net + vat
  if(!r.totalAmount&&r.netAmount&&r.vatAmount){
    r.totalAmount=r.netAmount+r.vatAmount;
  }

  // ---- VENDOR DETECTION ----
  // Approach: scan lines for company-like names.
  // Buyer is always Raffles (identifiable by OTELCİLİK / ALICI / raffles.com).
  // Seller = first company name that is NOT the buyer, NOT a bank, NOT noise.
  var lines=text.split(/\n/);
  var BUYER_KEYS=/OTELCİLİK|Otelcilik|ALICI|raffles\.com/i;
  var SKIP_KEYS=/Banka|Verg[iİ]\s*Da[iİ]res[iİ]|YALNIZ|İrsaliye|Faturaport|IBAN|Açıklama/i;
  var COMPANY_SUFFIX=/(?:ŞİRKETİ|LTD|HİZMETLERİ|ŞUBESİ|SANAYİ|TİCARET|ORGANİZASYON|\sA\.Ş)/i;
  for(var li=0;li<lines.length&&!r.vendor;li++){
    var ln=lines[li].trim();
    if(ln.length<6)continue;
    if(BUYER_KEYS.test(ln))continue;
    if(SKIP_KEYS.test(ln))continue;
    if(!COMPANY_SUFFIX.test(ln))continue;
    // Zorlu line: only keep if it's a specific sub-entity (GURME, MARKET etc.)
    if(/ZORLU/i.test(ln)&&!/GURME|MARKET|RESTORAN/i.test(ln))continue;
    r.vendor=ln.replace(/\s{2,}/g," ").slice(0,80);
  }

  return r;
}

function expAddFromParsed(){
  if(!_expParsedData)return;
  var p=_expParsedData;
  var cat=document.getElementById("expInvCategory").value;
  var desc=document.getElementById("expInvDesc").value.trim();
  var guest=(document.getElementById("expInvGuest")||{}).value||"";
  var butler=(document.getElementById("expInvButler")||{}).value||"";
  var payType=(document.getElementById("expInvPayType")||{}).value||"expense";
  var vendor=(document.getElementById("expE_vendor")||{}).value||p.vendor||"";
  var invoiceNo=(document.getElementById("expE_invoiceNo")||{}).value||p.invoiceNo||"";
  var entryDate=(document.getElementById("expE_date")||{}).value||p.date||new Date().toISOString().split("T")[0];
  var netAmount=parseFloat((document.getElementById("expE_net")||{}).value)||p.netAmount||0;
  var totalAmount=parseFloat((document.getElementById("expE_total")||{}).value)||p.totalAmount||0;
  var invoiceType=(document.getElementById("expE_type")||{}).value||p.invoiceType||"SATIS";
  var entry={
    type:"invoice",
    date:entryDate,
    vendor:vendor,
    invoiceNo:invoiceNo,
    netAmount:netAmount,
    vatAmount:p.vatAmount||0,
    totalAmount:totalAmount,
    vatRate:p.vatRate||0,
    vatBreakdown:p.vatBreakdown||[],
    invoiceType:invoiceType,
    category:cat||"",
    description:desc||"",
    guest:guest,
    butler:butler,
    payType:payType,
    status:"bekliyor",
    fileRef:""
  };
  var ed=new Date(entryDate);
  var em=ed.getMonth()+1,ey=ed.getFullYear();
  if(em!==exp_currentMonth||ey!==exp_currentYear){
    exp_currentMonth=em;exp_currentYear=ey;
    document.getElementById("exp_monthSel").value=em;
    document.getElementById("exp_yearSel").value=ey;
    expLoad();
    expLoadLog();
  }
  expenseList.push(entry);
  expSave();
  expAddLog("add",entry);
  expCancelParsed();
  expRenderAll();
  expShowTab("list");
}

function expCancelParsed(){
  _expParsedData=null;
  document.getElementById("expParsedPreview").style.display="none";
  document.getElementById("expPdfStatus").textContent="";
  document.getElementById("expInvDesc").value="";
  var fi=document.getElementById("expPdfInput");
  if(fi)fi.value="";
}

// ---- RECEIPT QUICK ENTRY ----
function expCalcNet(){
  var amt=parseFloat(document.getElementById("expRcpAmount").value)||0;
  var vatPct=parseInt(document.getElementById("expRcpVat").value)||0;
  var net=vatPct>0?amt/(1+vatPct/100):amt;
  document.getElementById("expRcpNet").value=net.toLocaleString("tr-TR",{minimumFractionDigits:2})+" TL";
}

function expAddReceipt(){
  var vendor=document.getElementById("expRcpVendor").value.trim();
  var date=document.getElementById("expRcpDate").value;
  var no=document.getElementById("expRcpNo").value.trim();
  var amt=parseFloat(document.getElementById("expRcpAmount").value)||0;
  var vatPct=parseInt(document.getElementById("expRcpVat").value)||0;
  var cat=document.getElementById("expRcpCategory").value;
  var desc=document.getElementById("expRcpDesc").value.trim();
  var guest=(document.getElementById("expRcpGuest")||{}).value||"";
  var butler=(document.getElementById("expRcpButler")||{}).value||"";
  var payType=(document.getElementById("expRcpPayType")||{}).value||"expense";
  if(!vendor){alert("Satici adi giriniz.");return;}
  if(!amt){alert("Tutar giriniz.");return;}
  var net=vatPct>0?amt/(1+vatPct/100):amt;
  var vat=amt-net;
  var entry={
    type:"receipt",
    date:date||new Date().toISOString().split("T")[0],
    vendor:vendor,
    invoiceNo:no||"",
    netAmount:Math.round(net*100)/100,
    vatAmount:Math.round(vat*100)/100,
    totalAmount:Math.round(amt*100)/100,
    vatRate:vatPct,
    category:cat||"",
    description:desc||"",
    guest:guest,
    butler:butler,
    payType:payType,
    status:"bekliyor",
    fileRef:""
  };
  var entryDate=entry.date;
  var ed=new Date(entryDate);
  var em=ed.getMonth()+1,ey=ed.getFullYear();
  if(em!==exp_currentMonth||ey!==exp_currentYear){
    exp_currentMonth=em;exp_currentYear=ey;
    document.getElementById("exp_monthSel").value=em;
    document.getElementById("exp_yearSel").value=ey;
    expLoad();
    expLoadLog();
  }
  expenseList.push(entry);
  _expLastReceipt={vendor:vendor,vatPct:vatPct,cat:cat,butler:butler,payType:payType};
  expSave();
  expAddLog("add",entry);
  expUpdateVendorList();
  document.getElementById("expRcpAmount").value="";
  document.getElementById("expRcpNo").value="";
  document.getElementById("expRcpDesc").value="";
  document.getElementById("expRcpNet").value="";
  document.getElementById("expRcpGuest").value="";
  expRenderAll();
  expShowTab("list");
}

function expRepeatLast(){
  if(!_expLastReceipt){alert("Tekrarlanacak onceki giris yok.");return;}
  document.getElementById("expRcpVendor").value=_expLastReceipt.vendor||"";
  document.getElementById("expRcpVat").value=_expLastReceipt.vatPct||20;
  document.getElementById("expRcpCategory").value=_expLastReceipt.cat||"";
}

function expUpdateVendorList(){
  var dl=document.getElementById("expVendorList");
  if(!dl)return;
  var vendors={};
  expenseList.forEach(function(e){if(e.vendor)vendors[e.vendor]=1});
  dl.innerHTML="";
  Object.keys(vendors).forEach(function(v){
    var o=document.createElement("option");o.value=v;dl.appendChild(o);
  });
}

function expDownloadTemplate(){
  var b=atob(EXP_TEMPLATE_B64);
  var buf=new Uint8Array(b.length);
  for(var i=0;i<b.length;i++)buf[i]=b.charCodeAt(i);
  var blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="Masraf_Kayit_Formu_Sablon.xlsx";
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

async function expDownloadXLSX(){
  if(!expenseList.length){alert("Bu ay icin harcama kaydi yok.");return;}
  if(typeof JSZip==="undefined")return alert("JSZip yuklenemedi.");

  try{
  var raw=Uint8Array.from(atob(EXP_TEMPLATE_B64),function(c){return c.charCodeAt(0)});
  var zip=await JSZip.loadAsync(raw.buffer);

  // Fatura/Fiş ayır
  var invoices=expenseList.filter(function(e){return e.type==="invoice"});
  var receipts=expenseList.filter(function(e){return e.type==="receipt"});
  var untyped=expenseList.filter(function(e){return e.type!=="invoice"&&e.type!=="receipt"});
  invoices=invoices.concat(untyped);

  // Gruplar (6'şar, max 6 sayfa)
  var groups=[];
  for(var i=0;i<invoices.length;i+=6) groups.push(invoices.slice(i,i+6));
  for(var i=0;i<receipts.length;i+=6) groups.push(receipts.slice(i,i+6));
  var usedCount=Math.min(groups.length,6)||1;

  var esc=function(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")};

  // Hücreye değer yaz
  function setCell(xml,ref,val){
    var re=new RegExp('(<c\\s[^>]*r="'+ref+'"[^>]*?)(/>' + '|' + '>([\\s\\S]*?)</c>)');
    var m=xml.match(re);
    if(!m) return xml;
    var tag=m[1];
    tag=tag.replace(/\s+t="[^"]*"/g,"");
    if(typeof val==="number"){
      return xml.replace(m[0], tag+'><v>'+val+'</v></c>');
    }else{
      return xml.replace(m[0], tag+' t="inlineStr"><is><t>'+esc(val)+'</t></is></c>');
    }
  }

  // Her sayfa için veri yaz
  for(var g=0;g<groups.length&&g<6;g++){
    var path="xl/worksheets/sheet"+(g+1)+".xml";
    var xml=await zip.file(path).async("string");
    var items=groups[g];
    var _d=new Date(),today=String(_d.getDate()).padStart(2,"0")+"."+String(_d.getMonth()+1).padStart(2,"0")+"."+_d.getFullYear();

    xml=setCell(xml,"C4",today);
    xml=setCell(xml,"C5","Haktan Durgun");

    var tNet=0,tV10=0,tV20=0,tV1=0,tAll=0;
    for(var i=0;i<items.length&&i<6;i++){
      var e=items[i], r=12+i, v10=0,v20=0,v1=0;
      if(e.vatBreakdown&&e.vatBreakdown.length){
        e.vatBreakdown.forEach(function(vb){
          if(vb.rate===10)v10+=vb.amount;
          else if(vb.rate===20)v20+=vb.amount;
          else if(vb.rate===1)v1+=vb.amount;
        });
      }else{
        if(e.vatRate===10)v10=e.vatAmount||0;
        else if(e.vatRate===20)v20=e.vatAmount||0;
        else if(e.vatRate===1)v1=e.vatAmount||0;
      }
      tNet+=(e.netAmount||0);tV10+=v10;tV20+=v20;tV1+=v1;tAll+=(e.totalAmount||0);

      xml=setCell(xml,"B"+r,e.vendor||"");
      xml=setCell(xml,"C"+r,e.description||e.category||"");
      xml=setCell(xml,"D"+r,e.date?e.date.replace(/(\d{4})-(\d{2})-(\d{2})/,"$3.$2.$1"):"");
      xml=setCell(xml,"E"+r,e.invoiceNo||"");
      xml=setCell(xml,"F"+r,e.netAmount||0);
      if(v10) xml=setCell(xml,"G"+r,v10);
      if(v20) xml=setCell(xml,"H"+r,v20);
      if(v1)  xml=setCell(xml,"I"+r,v1);
      xml=setCell(xml,"L"+r,e.totalAmount||0);
    }
    // TOPLAM
    xml=setCell(xml,"F18",tNet);
    xml=setCell(xml,"G18",tV10||0);
    xml=setCell(xml,"H18",tV20||0);
    xml=setCell(xml,"I18",tV1||0);
    xml=setCell(xml,"L18",tAll);

    zip.file(path,xml);
  }

  // ---- Kullanılmayan sayfaları sil ----
  for(var s=usedCount+1;s<=6;s++){
    zip.remove("xl/worksheets/sheet"+s+".xml");
    zip.remove("xl/worksheets/_rels/sheet"+s+".xml.rels");
    zip.remove("xl/drawings/drawing"+s+".xml");
    zip.remove("xl/drawings/_rels/drawing"+s+".xml.rels");
  }
  // workbook.xml: fazla <sheet> taglerini ve activeTab'ı düzelt
  var wbXml=await zip.file("xl/workbook.xml").async("string");
  wbXml=wbXml.replace(/firstSheet="\d+"/g,'firstSheet="0"');
  wbXml=wbXml.replace(/activeTab="\d+"/g,'activeTab="0"');
  for(var s=usedCount+1;s<=6;s++){
    wbXml=wbXml.replace(new RegExp('<sheet[^>]*r:id="rId'+s+'"[^/]*/>'),"");
    wbXml=wbXml.replace(new RegExp('<definedName[^>]*localSheetId="'+(s-1)+'"[^<]*</definedName>'),"");
  }
  zip.file("xl/workbook.xml",wbXml);
  // workbook.xml.rels: fazla worksheet relationship'lerini sil
  var relsXml=await zip.file("xl/_rels/workbook.xml.rels").async("string");
  for(var s=usedCount+1;s<=6;s++){
    relsXml=relsXml.replace(new RegExp('<Relationship[^>]*Target="worksheets/sheet'+s+'.xml"[^/]*/>'),"");
  }
  zip.file("xl/_rels/workbook.xml.rels",relsXml);
  // [Content_Types].xml: fazla Override'ları sil
  var ctXml=await zip.file("[Content_Types].xml").async("string");
  for(var s=usedCount+1;s<=6;s++){
    ctXml=ctXml.replace(new RegExp('<Override[^>]*sheet'+s+'.xml"[^/]*/>'),"");
    ctXml=ctXml.replace(new RegExp('<Override[^>]*drawing'+s+'.xml"[^/]*/>'),"");
  }
  zip.file("[Content_Types].xml",ctXml);

  // İndir
  var months=["","Ocak","Subat","Mart","Nisan","Mayis","Haziran","Temmuz","Agustos","Eylul","Ekim","Kasim","Aralik"];
  var blob=await zip.generateAsync({type:"blob"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="Expense_"+months[exp_currentMonth]+"_"+exp_currentYear+".xlsx";
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);

  }catch(err){alert("Excel hatasi: "+err.message);console.error(err)}
}

// ---- SETTINGS ----
function renderExpenseSettings(){
  // Kasa
  var kasaInp=document.getElementById("expKasaInput");
  if(kasaInp)kasaInp.value=getExpKasa();
  // Budget
  var inp=document.getElementById("expBudgetInput");
  if(inp)inp.value=getExpBudget();
  // Categories
  var cats=getExpCategories();
  var el=document.getElementById("expCategoryTags");
  if(!el)return;
  el.innerHTML="";
  cats.forEach(function(c,i){
    el.innerHTML+='<span style="display:inline-flex;align-items:center;gap:3px;background:#e0e7ff;color:#3730a3;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">'+
      esc(c)+' <button onclick="removeExpCategory('+i+')" style="border:none;background:none;color:#dc2626;cursor:pointer;font-weight:700;font-size:12px;padding:0 2px">&times;</button></span>';
  });
}

function saveExpBudget(){
  var v=parseFloat(document.getElementById("expBudgetInput").value)||0;
  setExpBudget(v);
  expRenderBudget();
}

function addExpCategory(){
  var inp=document.getElementById("expCategoryInput");
  var v=inp.value.trim();
  if(!v)return;
  var cats=getExpCategories();
  if(cats.indexOf(v)<0){cats.push(v);setExpCategories(cats);renderExpenseSettings();expPopulateCategories();}
  inp.value="";
}

function removeExpCategory(idx){
  var cats=getExpCategories();cats.splice(idx,1);setExpCategories(cats);renderExpenseSettings();expPopulateCategories();
}
