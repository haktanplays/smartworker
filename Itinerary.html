*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f4;min-height:100vh}
.topbar{background:linear-gradient(135deg,#1a6b5c,#0d4a3f);color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.topbar h1{font-size:18px;font-weight:600}
.topbar small{font-size:10px;letter-spacing:2px;opacity:.5;text-transform:uppercase;display:block}
.nav{display:flex;gap:0;background:#fff;border-bottom:2px solid #e5e7eb;padding:0 16px;overflow-x:auto}
.nav-btn{padding:12px 20px;border:none;background:none;font-size:13px;font-weight:600;color:#6b7280;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.nav-btn.active{color:#1a6b5c;border-bottom-color:#1a6b5c}
.nav-btn:hover{color:#1a6b5c}
.page{display:none;max-width:1100px;margin:0 auto;padding:20px 16px}
.page.active{display:block}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}
.card h2{font-size:15px;font-weight:600;color:#1e293b;margin-bottom:10px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.hint{font-size:12px;color:#6b7280}
.btn{padding:7px 18px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;display:inline-block}
.btn-primary{background:#1a6b5c;color:#fff}
.btn-dark{background:#1e293b;color:#fff}
.btn-dark:hover{background:#334155}
.btn-danger{background:#ef4444;color:#fff}
.btn-sm{font-size:11px;padding:4px 10px;border:1px solid #d1d5db;border-radius:4px;cursor:pointer;background:#fff}
.upload-area{border:2px dashed #d1d5db;border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:border-color .2s}
.upload-area:hover,.upload-area.dragover{border-color:#1a6b5c;background:#f0f7f5}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:6px 8px;color:#6b7280;font-weight:600;font-size:11px;border-bottom:2px solid #e5e7eb;position:sticky;top:0;background:#fff}
td{padding:6px 8px;border-bottom:1px solid #f3f4f6;vertical-align:top}
tr:nth-child(even){background:#fafbfc}
td input,td select{padding:3px 5px;border:1px solid #e5e7eb;border-radius:4px;font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;margin:1px 2px}
.badge-vvip{background:#fecaca;color:#991b1b}
.badge-vip{background:#fef3c7;color:#92400e}
.badge-equip{background:#dbeafe;color:#1e40af}
.badge-deco{background:#f3e8ff;color:#7c3aed}
.badge-minibar{background:#e0e7ff;color:#3730a3}
.badge-pref{background:#f3e8ff;color:#6b21a8}
.badge-new{background:#fef9c3;color:#854d0e}
.badge-repeat{background:#d1fae5;color:#065f46}
.badge-dueout{background:#fee2e2;color:#991b1b}
.stats{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.stat{font-size:12px;color:#6b7280}.stat b{color:#1e293b}
.trace-text{font-size:11px;color:#374151;line-height:1.4;max-width:400px}
.kw-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:11px;margin:2px;background:#f3f4f6;color:#374151}
.kw-tag button{background:none;border:none;color:#ef4444;cursor:pointer;font-size:13px;padding:0 2px}
.kw-input{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.kw-input input{padding:4px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:12px;width:180px}
.settings-segment{border-bottom:1px solid #e5e7eb}
.settings-header{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;cursor:pointer;user-select:none;background:#fafbfc;transition:background .15s}
.settings-header:hover{background:#f1f5f9}
.settings-header span:first-child{font-size:14px;font-weight:600;color:#1e293b}
.settings-arrow{font-size:10px;color:#94a3b8;transition:transform .2s}
.settings-header.open .settings-arrow{transform:rotate(180deg)}
.settings-body{padding:0 18px 16px}
.settings-info{margin:10px 0 14px;padding:10px 14px;background:#f0f9ff;border-left:3px solid #3b82f6;border-radius:0 6px 6px 0;font-size:11px;line-height:1.6;color:#1e40af}
.section{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #f3f4f6}
.section:last-child{border-bottom:none}
.section h3{font-size:13px;font-weight:600;color:#374151;margin-bottom:8px}
input[type="date"]{padding:5px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px}
label{font-size:13px;font-weight:600;color:#374151}
textarea{width:100%;min-height:80px;padding:10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-family:monospace;resize:vertical;line-height:1.6}
.rm-btn{background:none;border:none;color:#ef4444;cursor:pointer;font-size:15px}
.hitap{font-size:11px;color:#6b7280;font-style:italic;white-space:nowrap}
#guest-table-wrap,#trace-table-wrap,#equip-table-wrap{overflow-x:auto}
.tabs{display:flex;gap:0;margin-bottom:12px}
.tab{padding:8px 16px;border:1px solid #d1d5db;cursor:pointer;font-size:12px;font-weight:600;background:#fff;color:#6b7280}
.tab:first-child{border-radius:6px 0 0 6px}
.tab:last-child{border-radius:0 6px 6px 0}
.tab.active{background:#1a6b5c;color:#fff;border-color:#1a6b5c}
.actions{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap}
#page-itinerary input::placeholder,#page-itinerary textarea::placeholder{color:#b0a898;font-style:italic;}
</style>
</style>
</head>

function switchItinTab(t){
  document.getElementById("itinEditorCard").style.display=t==="editor"?"block":"none";
  document.getElementById("itinPreviewCard").style.display=t==="preview"?"block":"none";
  document.querySelectorAll("#page-itinerary .tab").forEach(function(el,i){el.classList.toggle("active",i===(t==="editor"?0:t==="preview"?1:2))});
  if(t==="preview")renderItPreview();
}

function initItinerary(){renderItRooms();renderItDays()}

function handleItPhoto(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){itPhoto=e.target.result;document.getElementById("itPhotoPreview").src=itPhoto;document.getElementById("itPhotoPreview").style.display="inline";document.getElementById("itPhotoRm").style.display="inline"};r.readAsDataURL(f)}
function removeItPhoto(){itPhoto=null;document.getElementById("itPhotoPreview").style.display="none";document.getElementById("itPhotoRm").style.display="none";document.getElementById("itPhotoInput").value=""}

// Room CRUD
function addItRoom(){itRooms.push({number:"",guests:"",isPrimary:false});renderItRooms()}
function rmItRoom(i){itRooms.splice(i,1);renderItRooms()}
function updItRoom(i,k,v){itRooms[i][k]=v}
function renderItRooms(){
  var w=document.getElementById("itRoomsWrap");var h="";
  for(var i=0;i<itRooms.length;i++){var r=itRooms[i];
    h+='<div style="display:flex;gap:6px;align-items:center;margin-bottom:4px"><input value="'+esc(r.number)+'" placeholder="Ornek: 1501" style="width:80px;padding:4px 6px;border:1px solid #d1d5db;border-radius:4px;font-size:12px" onchange="updItRoom('+i+',\'number\',this.value)"><input value="'+esc(r.guests)+'" placeholder="Ornek: Mr. & Mrs. Smith" style="flex:1;padding:4px 6px;border:1px solid #d1d5db;border-radius:4px;font-size:12px" onchange="updItRoom('+i+',\'guests\',this.value)"><label style="font-size:11px;white-space:nowrap"><input type="checkbox" '+(r.isPrimary?"checked":"")+' onchange="updItRoom('+i+',\'isPrimary\',this.checked)"> Primary</label><button class="rm-btn" onclick="rmItRoom('+i+')">\u00d7</button></div>';
  }w.innerHTML=h;
}

// Day CRUD
function addItDay(){itDays.push({date:"",label:"",sections:[{title:"",note:"",items:[{time:"",text:""}]}]});renderItDays()}
function rmItDay(di){if(itDays.length<2)return;itDays.splice(di,1);renderItDays()}
function addItSec(di){itDays[di].sections.push({title:"",note:"",items:[{time:"",text:""}]});renderItDays()}
function rmItSec(di,si){if(itDays[di].sections.length<2)return;itDays[di].sections.splice(si,1);renderItDays()}
function addItItem(di,si){itDays[di].sections[si].items.push({time:"",text:""});renderItDays()}
function rmItItem(di,si,ii){if(itDays[di].sections[si].items.length<2)return;itDays[di].sections[si].items.splice(ii,1);renderItDays()}

function renderItDays(){
  var w=document.getElementById("itDaysWrap");var h="";
  for(var di=0;di<itDays.length;di++){var d=itDays[di];
    h+='<div style="border:1px solid #e5e7eb;border-radius:8px;padding:10px;margin-bottom:10px;background:#fafbfc">';
    h+='<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px"><span class="badge" style="background:#d1fae5;color:#065f46">Gun '+(di+1)+'</span>';
    h+='<input value="'+esc(d.date)+'" placeholder="Ornek: 15 March 2025" style="flex:1;padding:4px 6px;border:1px solid #d1d5db;border-radius:4px;font-size:12px" onchange="itDays['+di+'].date=this.value">';
    h+='<input value="'+esc(d.label)+'" placeholder="Ornek: Day 1" style="width:100px;padding:4px 6px;border:1px solid #d1d5db;border-radius:4px;font-size:12px" onchange="itDays['+di+'].label=this.value">';
    if(itDays.length>1)h+='<button class="btn-sm" style="color:#ef4444;border-color:#ef4444" onclick="rmItDay('+di+')">Sil</button>';
    h+='</div>';
    for(var si=0;si<d.sections.length;si++){var s=d.sections[si];
      h+='<div style="margin-left:12px;border-left:2px solid #1a6b5c;padding-left:10px;margin-bottom:8px">';
      h+='<div style="display:flex;gap:4px;align-items:center;margin-bottom:4px"><input value="'+esc(s.title)+'" placeholder="Ornek: Morning / Sabah" style="flex:1;padding:3px 6px;border:1px solid #d1d5db;border-radius:4px;font-size:12px;font-weight:600" onchange="itDays['+di+'].sections['+si+'].title=this.value">';
      if(d.sections.length>1)h+='<button class="rm-btn" style="font-size:13px" onclick="rmItSec('+di+','+si+')">\u00d7</button>';
      h+='</div>';
      h+='<input value="'+esc(s.note)+'" placeholder="Ornek: Dress code: Smart Casual" style="width:100%;padding:3px 6px;border:1px solid #e5e7eb;border-radius:4px;font-size:11px;color:#6b7280;font-style:italic;margin-bottom:4px" onchange="itDays['+di+'].sections['+si+'].note=this.value">';
      for(var ii=0;ii<s.items.length;ii++){var it=s.items[ii];
        h+='<div style="display:flex;gap:4px;align-items:center;margin-bottom:2px"><input value="'+esc(it.time)+'" placeholder="09:00" style="width:50px;padding:3px 5px;border:1px solid #e5e7eb;border-radius:4px;font-size:11px;text-align:center" onchange="itDays['+di+'].sections['+si+'].items['+ii+'].time=this.value"><input value="'+esc(it.text)+'" placeholder="Ornek: Breakfast at Arola Restaurant" style="flex:1;padding:3px 5px;border:1px solid #e5e7eb;border-radius:4px;font-size:11px" onchange="itDays['+di+'].sections['+si+'].items['+ii+'].text=this.value">';
        if(s.items.length>1)h+='<button class="rm-btn" style="font-size:12px" onclick="rmItItem('+di+','+si+','+ii+')">\u00d7</button>';
        h+='</div>';
      }
      h+='<button style="font-size:10px;color:#1a6b5c;background:none;border:none;cursor:pointer;margin-top:2px" onclick="addItItem('+di+','+si+')">+ Madde</button>';
      h+='</div>';
    }
    h+='<button style="font-size:11px;color:#1a6b5c;background:none;border:none;cursor:pointer;font-weight:600;margin-left:12px" onclick="addItSec('+di+')">+ Bolum Ekle</button>';
    h+='</div>';
  }w.innerHTML=h;
}

// Preview
function renderItPreview(){
  document.getElementById("itPreviewWrap").innerHTML=buildItPages("preview");
}

function getItData(){
  return{gn:document.getElementById("itGuestName").value,gt:document.getElementById("itGuestTitle").value,sd:document.getElementById("itStayDates").value,gb:document.getElementById("itGuestBio").value};
}

function buildItPages(mode){
  var d=getItData();
  var isMini=mode==="preview";
  // PPTX slide=190x339mm. Preview ~440px wide, export A4-ish
  var ff='font-family:Georgia,"Times New Roman",serif';
  // Logo: 47mm wide on 190mm slide = ~25%. Small, centered at top
  var logoW=isMini?55:95;
  var logo='<div style="text-align:center;padding-top:'+(isMini?6:10)+'px"><img src="'+IT_LOGO+'" style="width:'+logoW+'px;height:auto;display:block;margin:0 auto"></div>';
  // Footer: just the RAFFLES.COM/ISTANBUL image, ~40% width, no logo
  var ftrW=isMini?140:280;
  var footer='<div style="position:absolute;bottom:'+(isMini?8:18)+'px;left:0;right:0;text-align:center"><img src="'+IT_FOOTER+'" style="width:'+ftrW+'px;height:auto;display:inline-block;opacity:.85"></div>';
  // Page container
  var pw=isMini?'max-width:440px;margin:0 auto 14px':'width:210mm;margin:0 auto;page-break-after:always';
  var ph=isMini?'min-height:600px':'min-height:297mm';
  var pageS='background:#fff;'+pw+';position:relative;'+ph+(isMini?';border-radius:4px;box-shadow:0 2px 10px rgba(0,0,0,.1)':'');

  var initials=d.gn.split(" ").map(function(n){return n[0]||""}).join("");

  // Bio photo — square like PPTX (92x92mm on 190mm = ~48%)
  var photoSz=isMini?160:280;
  var photoEl=itPhoto?'<img src="'+itPhoto+'" style="width:'+photoSz+'px;height:'+photoSz+'px;object-fit:cover;display:block;margin:0 auto">':'<div style="width:'+photoSz+'px;height:'+photoSz+'px;background:#e8e0d0;display:flex;align-items:center;justify-content:center;margin:0 auto;color:#B79760;'+ff+';font-size:'+(isMini?48:72)+'px;font-weight:300">'+initials+'</div>';

  // Room lines
  // Sort rooms: primary first
  var sortedRooms=itRooms.slice().sort(function(a,b){return(b.isPrimary?1:0)-(a.isPrimary?1:0)});
  var roomsH="";
  for(var i=0;i<sortedRooms.length;i++){var r=sortedRooms[i];
    roomsH+='<div style="'+ff+';font-size:'+(isMini?11:16)+'px;text-align:center;margin-bottom:'+(isMini?4:8)+'px;color:#333">'+esc(r.number)+' '+esc(r.guests)+'</div>';
  }

  // === PAGE 1: COVER ===
  // PPTX layout: logo y=1.5%, ITINERARY y=15%, name y=23%, images y=37% h=32%, rooms y=74%, footer y=93%
  var p1='<div style="'+pageS+';text-align:center;padding:0">'+logo;
  p1+='<h1 style="'+ff+';font-size:'+(isMini?24:40)+'px;font-weight:300;color:#B79760;margin:'+(isMini?'14px 0 10px':'28px 0 16px')+'">ITINERARY</h1>';
  p1+='<div style="'+ff+';font-size:'+(isMini?16:24)+'px;color:#333;margin-bottom:0">'+esc(d.gn)+'</div>';
  p1+='<div style="'+ff+';font-size:'+(isMini?12:17)+'px;color:#333;font-weight:700;margin-bottom:'+(isMini?16:32)+'px">'+esc(d.sd)+'</div>';
  // 3 images side by side with ~3% gaps (6mm on 190mm)
  var imgH=isMini?140:240;
  var gap=isMini?5:10;
  p1+='<div style="display:flex;gap:'+gap+'px;padding:0 '+(isMini?0:0)+'px;margin-bottom:'+(isMini?16:32)+'px">';
  p1+='<div style="flex:1;height:'+imgH+'px;overflow:hidden"><img src="'+IT_IMG1+'" style="width:100%;height:100%;object-fit:cover"></div>';
  p1+='<div style="flex:1;height:'+imgH+'px;overflow:hidden"><img src="'+IT_IMG2+'" style="width:100%;height:100%;object-fit:cover"></div>';
  p1+='<div style="flex:1;height:'+imgH+'px;overflow:hidden"><img src="'+IT_IMG3+'" style="width:100%;height:100%;object-fit:cover"></div>';
  p1+='</div>';
  p1+='<div style="margin-bottom:'+(isMini?20:40)+'px">'+roomsH+'</div>';
  p1+=footer+'</div>';

  // === PAGE 2: BIO ===
  var p2='<div style="'+pageS+';text-align:center;padding:0">'+logo;
  p2+='<div style="margin:'+(isMini?'8px 0':'14px 0')+'">'+photoEl+'</div>';
  p2+='<div style="'+ff+';font-size:'+(isMini?14:20)+'px;font-weight:700;font-style:italic;color:#333;margin-bottom:1px">'+esc(d.gn)+'</div>';
  p2+='<div style="'+ff+';font-size:'+(isMini?11:15)+'px;font-style:italic;color:#555;margin-bottom:'+(isMini?10:18)+'px">'+esc(d.gt)+'</div>';
  p2+='<p style="'+ff+';font-size:'+(isMini?10:13)+'px;line-height:1.65;color:#333;text-align:justify;margin:0 auto;max-width:'+(isMini?370:500)+'px;padding:0 '+(isMini?16:30)+'px">'+esc(d.gb)+'</p>';
  p2+=footer+'</div>';

  // === SCHEDULE PAGES ===
  var sp="";
  for(var di=0;di<itDays.length;di++){var day=itDays[di];
    var pg='<div style="'+pageS+';padding:0">'+logo;
    pg+='<div style="padding:0 '+(isMini?16:36)+'px">';
    pg+='<h2 style="'+ff+';font-size:'+(isMini?18:28)+'px;font-weight:700;color:#333;margin:'+(isMini?'10px 0 4px':'20px 0 6px')+'">'+esc(day.date)+'</h2>';
    for(var si=0;si<day.sections.length;si++){var sec=day.sections[si];
      var isAmenity=sec.title.toLowerCase().indexOf("amenity")>=0;
      pg+='<h3 style="'+ff+';font-size:'+(isMini?12:17)+'px;font-weight:'+(isAmenity?'700':'400')+';font-style:italic;color:#333;margin:'+(isMini?'8px 0 3px':'14px 0 4px')+'">'+esc(sec.title)+'</h3>';
      if(sec.note)pg+='<p style="'+ff+';font-size:'+(isMini?10:13)+'px;color:#333;margin:0 0 '+(isMini?3:5)+'px">'+esc(sec.note)+'</p>';
      pg+='<ul style="list-style:disc;padding-left:'+(isMini?18:26)+'px;margin:0">';
      for(var ii=0;ii<sec.items.length;ii++){var it=sec.items[ii];
        var txt=it.time?esc(it.time)+' — '+esc(it.text):esc(it.text);
        pg+='<li style="'+ff+';font-size:'+(isMini?10:13)+'px;color:#333;margin-bottom:'+(isMini?2:3)+'px;line-height:1.5">'+txt+'</li>';
      }
      pg+='</ul>';
    }
    pg+='</div>';
    pg+=footer+'</div>';
    sp+=pg;
  }

  return p1+p2+sp;
}

// Export — PPTX via PptxGenJS (matched to reference Santi_Bhirombhakdi.pptx)
function exportItPPTX(){
  var d=getItData();
  var pptx=new PptxGenJS();
  // Reference slide: 7.50" x 13.33"
  pptx.defineLayout({name:'RafflesIt',width:7.50,height:13.33});
  pptx.layout='RafflesIt';

  // Fonts from reference
  var fHead='Canela Thin';  // headings, ITINERARY title, date headings, section titles
  var fBody='Lato Light';   // bio text, schedule items
  var fCover='Segoe UI Light'; // cover name, dates, rooms

  function b64img(dataUri){return dataUri.replace(/^data:image\/\w+;base64,/,"")}
  var logoData='image/png;base64,'+b64img(IT_LOGO);
  var footerData='image/png;base64,'+b64img(IT_FOOTER);

  // ========== SLIDE 1: COVER ==========
  var s1=pptx.addSlide({bkgd:'FFFFFF'});
  s1.addImage({data:logoData,x:2.80,y:0.20,w:1.86,h:1.45});
  // ITINERARY — 36pt Canela Thin, color E7C99F, narrow centered box
  s1.addText('ITINERARY',{x:2.58,y:2.06,w:2.35,h:0.71,align:'center',fontFace:fHead,fontSize:36,color:'E7C99F'});
  // Name + Dates — single text box, 24pt Segoe UI Light
  s1.addText([
    {text:d.gn+'\n',options:{fontSize:24,fontFace:fCover,color:'333333'}},
    {text:d.sd,options:{fontSize:24,fontFace:fCover,color:'333333'}}
  ],{x:0.71,y:3.03,w:6.11,h:0.91,align:'center',lineSpacingMultiple:1.1});
  // 3 cover images
  s1.addImage({data:'image/jpeg;base64,'+b64img(IT_IMG1),x:0,y:4.88,w:2.36,h:4.24,sizing:{type:'cover',w:2.36,h:4.24}});
  s1.addImage({data:'image/jpeg;base64,'+b64img(IT_IMG2),x:2.58,y:4.88,w:2.34,h:4.24,sizing:{type:'cover',w:2.34,h:4.24}});
  s1.addImage({data:'image/jpeg;base64,'+b64img(IT_IMG3),x:5.15,y:4.88,w:2.35,h:4.24,sizing:{type:'cover',w:2.35,h:4.24}});
  // Rooms — 20pt Segoe UI Light (primary first)
  var sortedRooms=itRooms.slice().sort(function(a,b){return(b.isPrimary?1:0)-(a.isPrimary?1:0)});
  var roomTxt=sortedRooms.map(function(r){return r.number+' '+r.guests}).join('\n');
  s1.addText(roomTxt,{x:0.71,y:9.82,w:6.10,h:2.12,align:'center',fontFace:fCover,fontSize:20,color:'333333',lineSpacingMultiple:1.3});
  s1.addImage({data:footerData,x:2.22,y:12.47,w:3.02,h:0.62});

  // ========== SLIDE 2: BIO ==========
  var s2=pptx.addSlide({bkgd:'FFFFFF'});
  s2.addImage({data:logoData,x:2.80,y:0.20,w:1.86,h:1.45});
  // Guest photo (square 3.62x3.62)
  if(itPhoto){
    s2.addImage({data:itPhoto.replace(/^data:/,''),x:2.01,y:1.68,w:3.62,h:3.62,sizing:{type:'cover',w:3.62,h:3.62}});
  }else{
    var ini=d.gn.split(" ").map(function(n){return n[0]||""}).join("");
    s2.addText(ini,{x:2.01,y:1.68,w:3.62,h:3.62,align:'center',valign:'middle',fontFace:fHead,fontSize:48,color:'B79760',fill:{color:'E8E0D0'}});
  }
  // Name bold italic Canela Thin 20pt + Title italic Lato Light 20pt
  s2.addText([
    {text:d.gn+'\n',options:{bold:true,italic:true,fontSize:20,fontFace:fHead,color:'333333'}},
    {text:d.gt,options:{italic:true,fontSize:20,fontFace:fBody,color:'000000'}}
  ],{x:0.06,y:5.46,w:7.37,h:0.55,align:'center',lineSpacingMultiple:1.2});
  // Bio text — 16.5pt Lato Light
  s2.addText(d.gb,{x:0.31,y:5.95,w:6.89,h:6.21,align:'justify',fontFace:fBody,fontSize:16.5,color:'000000',lineSpacingMultiple:1.25});
  s2.addImage({data:footerData,x:2.22,y:12.47,w:3.02,h:0.62});

  // ========== SLIDE 3: SCHEDULE (all days on ONE slide) ==========
  var s3=pptx.addSlide({bkgd:'FFFFFF'});
  s3.addImage({data:logoData,x:2.80,y:0.20,w:1.86,h:1.45});
  // Build all days into one rich-text array
  var parts=[];
  for(var di=0;di<itDays.length;di++){var day=itDays[di];
    // Date heading — 28pt Canela Thin (no bold, no italic)
    if(di>0)parts.push({text:'\n',options:{fontSize:10,fontFace:fBody,bullet:{type:'none'}}});
    parts.push({text:day.date,options:{fontSize:28,fontFace:fHead,color:'333333',bullet:{type:'none'},paraSpaceBefore:di>0?14:0}});
    for(var si=0;si<day.sections.length;si++){var sec=day.sections[si];
      var isAm=sec.title.toLowerCase().indexOf("amenity")>=0;
      // Section title: italic Canela Thin, 24pt for normal sections, 20pt for AMENITY
      var secSz=isAm?20:24;
      parts.push({text:sec.title,options:{italic:true,fontSize:secSz,fontFace:fHead,color:'333333',bullet:{type:'none'},paraSpaceBefore:8}});
      // Note (like "Butler will inform...") — 18pt Lato Light, no bullet
      if(sec.note)parts.push({text:sec.note,options:{fontSize:18,fontFace:fBody,color:'333333',bullet:{type:'none'},paraSpaceBefore:2}});
      // Bullet items — 18pt Lato Light with bullet •
      for(var ii=0;ii<sec.items.length;ii++){var it=sec.items[ii];
        var itemTxt=it.time?it.time+' — '+it.text:it.text;
        parts.push({text:itemTxt,options:{fontSize:18,fontFace:fBody,color:'333333',bullet:{code:'2022'},paraSpaceBefore:1}});
      }
    }
  }
  s3.addText(parts,{x:0.43,y:1.81,w:6.72,h:10.14,valign:'top',lineSpacingMultiple:1.15});
  s3.addImage({data:footerData,x:2.22,y:12.47,w:3.02,h:0.62});

  pptx.writeFile({fileName:'Itinerary_'+d.gn.replace(/\s+/g,'_')+'.pptx'});
}
